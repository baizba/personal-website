<mat-card class="chat-card" appearance="outlined" [class.invisible]="chatInvisible">
  <mat-card-header>
    <mat-icon>auto_awesome</mat-icon>
    <mat-card-title>Chat with AI</mat-card-title>
  </mat-card-header>
  <mat-card-content
    class="messages"
    *ngFor="let message of chatService.history"
    [ngClass]="{
      'user-message': message.chatActor === ChatActorEnum.User,
      'ai-message': message.chatActor === ChatActorEnum.AI
    }">
    <p>{{message.chatActor}}:&nbsp;{{message.text}}</p>
  </mat-card-content>
  <mat-card-actions class="inputRow">
    <textarea
      placeholder="Type a message…"
      [(ngModel)]="draft"
      (input)="autoResize($event)"
      (keydown)="sendMessage($event)"
      class="chat-textarea" rows="1">
    </textarea>
  </mat-card-actions>
</mat-card>

<button mat-fab class="chat-float-btn" matTooltip="Chat with an AI about Branislav" (click)="toggleChat()">
  <mat-icon>chat</mat-icon>
</button>
